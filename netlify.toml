[build]
  publish = "."
  # No build command needed — pure static single-file app

[build.environment]
  # Ensure no node or build tools required

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
